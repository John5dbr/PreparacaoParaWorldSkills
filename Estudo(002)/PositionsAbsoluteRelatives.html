<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }
        div {
            height: 250px;
            width: 250px;
            background: pink;
            margin: 10px;
        }
        #div1 {
            position: absolute;
            background: rgb(99, 255, 201);
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
        #div2 {
            position: relative;
            background: rgb(122, 240, 87);
            right: 0px;
            bottom: 0px;
        }
        #div3 {
            
        }
    </style>
</head>
<body>
    <div id="div1">
        <p>Absolute</p>
    </div>
    <div id="div2">
        <p></p>
    </div>
    <div id="div3">
        <p></p>
    </div>
</body>
</html>
